name: Vagus Nerve Daily Report

on:
  schedule:
    - cron: "10 23 * * *" # UTC 23:10 = 台北時間 07:10
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

# Minimum permissions required for the workflow
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Determine date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            echo "target=$INPUT_DATE" >> $GITHUB_OUTPUT
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          fi
          echo "Date: $(cat $GITHUB_OUTPUT | grep target | cut -d= -f2)"

      - name: Check if already summarized
        id: check
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          if [ -f "docs/vagus-${TARGET}.html" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Report for $TARGET already exists, will regenerate"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch papers from PubMed
        env:
          FETCH_DAYS: "7"
          MAX_PAPERS: "60"
          PAPERS_OUTPUT: "papers.json"
        run: node scripts/fetch_papers.mjs
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(node -e "const d=require('./papers.json'); console.log(d.count||0)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo '{"date":"${{ steps.date.outputs.target }}","count":0,"papers":[]}' > papers.json
            echo "No papers found"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_API_BASE: ${{ vars.ZHIPU_API_BASE }}
          ZHIPU_TIMEOUT: "660000"
          ZHIPU_MAX_TOKENS: "100000"
          PAPERS_OUTPUT: "papers.json"
          REPORT_OUTPUT: "docs/vagus-${{ steps.date.outputs.target }}.html"
        run: node scripts/generate_report.mjs

      - name: Generate index page
        run: node scripts/generate_index.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🫀 vagus nerve daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          echo "### 🫀 Vagus Nerve Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.date.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** [vagus-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/vagus-nerve/vagus-${{ steps.date.outputs.target }}.html)" >> $GITHUB_STEP_SUMMARY
